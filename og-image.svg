<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FAF9F6"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="#DDD9D0" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent line -->
  <rect x="80" y="180" width="60" height="4" fill="#E5462A" rx="2"/>

  <!-- Logo text -->
  <text x="80" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">hbdlabs</text>

  <!-- Main headline -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#1A1A1A" letter-spacing="-3">Smart systems,</text>
  <text x="80" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#E5462A" letter-spacing="-3">everywhere.</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#7A7A7A">Open-source AI that works for everyone — on any device,</text>
  <text x="80" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#7A7A7A">in any language, with or without internet.</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#E5462A"/>
</svg>
